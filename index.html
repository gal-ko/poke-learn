<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poke-Learn</title>
  <link rel="icon" type="image/png" href="sprites/25.png">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/main.css">

  <script>
    (function() {
      var themes = {
        bulbasaur:  { bg:'#162428', mid:'#1E3438', srf:'#28484E', acc:'#50C0A8', hov:'#70E0C8', pid:1  },
        charmander: { bg:'#1E2838', mid:'#28394D', srf:'#325065', acc:'#F09858', hov:'#FFB478', pid:4  },
        squirtle:   { bg:'#141E30', mid:'#1A2C48', srf:'#243B5C', acc:'#58A8F0', hov:'#80C4FF', pid:7  },
        pikachu:    { bg:'#1A1A2E', mid:'#16213E', srf:'#0F3460', acc:'#FFCB05', hov:'#FFE066', pid:25 }
      };
      var id = localStorage.getItem('pokemon-theme');
      if (!id || !themes[id]) {
        var av = parseInt(localStorage.getItem('pokemon-avatar') || '0');
        id = av ? Object.keys(themes).find(function(k) { return themes[k].pid === av; }) : null;
        if (!id) id = 'bulbasaur';
      }
      var t = themes[id], s = document.documentElement.style;
      function rgb(h) { var n = parseInt(h.slice(1),16); return (n>>16&255)+', '+(n>>8&255)+', '+(n&255); }
      s.setProperty('--bg-deep',     t.bg);
      s.setProperty('--bg-mid',      t.mid);
      s.setProperty('--bg-surface',  t.srf);
      s.setProperty('--bg-deep-rgb', rgb(t.bg));
      s.setProperty('--accent',      t.acc);
      s.setProperty('--accent-hover',t.hov);
      s.setProperty('--accent-rgb',  rgb(t.acc));
    })();
  </script>
</head>
<body>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="profile-btn" id="profileBtn" onclick="showScreen('profile')" title="פרופיל" style="display:none"><img id="topbarAvatar" src="sprites/1.png" alt=""></button>
      <span class="topbar-username" id="topbarUsername"></span>
      <div class="stars-display"><span class="star-icon"><span class="mi">star</span></span><span id="starCount">0</span></div>
    </div>
    <h1 class="pixel" id="titleBtn" onclick="goHome()" style="cursor:pointer">Poke-Learn</h1>
    <button class="back-btn" id="backBtn">חזור →</button>
  </div>

  <div class="container"></div>

  <!-- Config & Data -->

  <!-- UI -->
  <script src="src/ui/theme.js"></script>
  <script src="src/ui/layout.js"></script>
  <script src="src/ui/rewards.js"></script>
  <script src="src/ui/evolution.js"></script>
  <script src="src/ui/top-bar.js"></script>

  <!-- Router -->
  <script src="src/core/router.js"></script>
  <script src="src/services/keyboard.js"></script>

  <!-- Feature Templates -->
  <script src="src/features/profile/template.js"></script>
  <script src="src/features/vocabulary/template.js"></script>
  <script src="src/features/spelling/template.js"></script>
